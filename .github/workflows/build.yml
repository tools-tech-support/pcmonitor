name: Build GameTuneLogger (Windows)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Download PresentMon (Intel, MIT license)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release download --repo GameTechDev/PresentMon --pattern "PresentMon-*-x64.exe" --dir pm
          $f = Get-ChildItem pm -Filter "PresentMon-*-x64.exe" | Select-Object -First 1
          Copy-Item $f.FullName "PresentMon.exe"

      - name: Download LibreHardwareMonitor DLLs (MPL 2.0)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          # Asset was renamed upstream: net472 build is now "LibreHardwareMonitor.zip"
          # (the .NET 10 build is "LibreHardwareMonitor.NET.10.zip" - NOT usable with pythonnet netfx)
          gh release download --repo LibreHardwareMonitor/LibreHardwareMonitor --pattern "LibreHardwareMonitor.zip" --dir lhm
          Expand-Archive lhm/LibreHardwareMonitor.zip -DestinationPath lhm/x
          # LibreHardwareMonitorLib.dll needs its sibling assemblies (System.Memory.dll etc.)
          # at runtime - shipping only the lib DLL makes CpuReader fail with
          # FileNotFoundException and every CPU sensor logs as None.
          New-Item -ItemType Directory -Force lhmlib | Out-Null
          Get-ChildItem lhm/x -Filter "*.dll" | Copy-Item -Destination lhmlib
          Get-ChildItem lhmlib | Select-Object Name

      - name: Build EXE with PyInstaller
        run: >
          pyinstaller --noconfirm --clean --onedir --noconsole
          --name GameTuneLogger
          --collect-all pythonnet
          --collect-all clr_loader
          --collect-all webview
          --hidden-import pystray._win32
          --hidden-import dashboard_ui
          --uac-admin
          --version-file version.txt
          gametune_logger.py

      - name: Bundle runtime files
        shell: pwsh
        run: |
          Copy-Item PresentMon.exe dist/GameTuneLogger/
          Copy-Item lhmlib/*.dll dist/GameTuneLogger/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameTuneLogger-win64
          path: dist/GameTuneLogger
